name: Related-persons data foundation (build + ship)

# Deliberate, manual (re)build of the свързани-лица data foundation and ship into a served D1.
#
# This is the heavy backfill/rebuild path — NOT the steady-state refresh. Per spec §7, ongoing
# incremental refresh (pull only the current-year delta) runs inside the Cloudflare `sigma-etl` Worker
# on a cron, the same operational model as the EOP ingest — deploy.yml ships that Worker. This workflow
# exists to (re)seed D1 after a schema change, a methodology change, or a first backfill, from a chosen
# environment, on demand only. It never runs on push (data writes are deliberate — see ci-vs-cd).
#
# Requires the same Cloudflare credentials as deploy.yml, scoped in the GitHub Environment (secret NAMES,
# never values): CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID + SIGMA_D1_ID, and the SIGMA_D1_NAME var.
# Fails loudly if they are absent.  # pragma: allowlist secret The full crawl of register.cacbg.bg is slow (a polite crawl of the
# whole corpus); in steady state the raw XML lives in R2 (ADR-0006) so the crawl is incremental — the
# `sigma-etl` Worker owns that. Here `full_crawl` forces a from-scratch corpus rebuild.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target D1 environment
        type: choice
        options: [dev, staging, production]
        default: dev
      full_crawl:
        description: Re-crawl the whole CACBG corpus from scratch (slow). Off = extract from the existing raw cache.
        type: boolean
        default: false

# Least-privilege: this workflow only reads the repo; it authenticates to Cloudflare with a scoped token.
permissions:
  contents: read

concurrency:
  # Never let two data-foundation writes to the same environment overlap; do not cancel one in flight.
  group: related-persons-data-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    # A from-scratch corpus crawl of the whole register is the long pole; cap generously but not the
    # 6-hour default. A run past this is wedged (stalled gov-server I/O) — fail rather than burn the slot.
    timeout-minutes: 120
    environment: ${{ inputs.environment }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SIGMA_D1_ID: ${{ secrets.SIGMA_D1_ID }}
      SIGMA_D1_NAME: ${{ vars.SIGMA_D1_NAME }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24 # node:sqlite (DatabaseSync) + native TS type-stripping, no flags
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Guard — require Cloudflare credentials
        run: |
          missing=()
          [ -z "${CLOUDFLARE_API_TOKEN}" ] && missing+=("CLOUDFLARE_API_TOKEN")
          [ -z "${CLOUDFLARE_ACCOUNT_ID}" ] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "${SIGMA_D1_ID}" ]          && missing+=("SIGMA_D1_ID")
          [ -z "${SIGMA_D1_NAME}" ]        && missing+=("SIGMA_D1_NAME (var)")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing repo/environment secrets: ${missing[*]} — cannot ship."
            exit 1
          fi

      # Crawl only on demand. The polite full crawl of register.cacbg.bg is long; steady-state refresh
      # (incremental, R2-cached) is the sigma-etl Worker's job (spec §7), not this workflow.
      - name: Crawl CACBG (full corpus)
        if: ${{ inputs.full_crawl }}
        run: node scripts/cacbg/fetch.mjs --concurrency 8

      - name: Extract declarations → staging (dedup by ControlHash)
        run: node scripts/cacbg/extract.mjs

      - name: Resolve → build domain in a work sqlite (libel gate must pass)
        run: node --import ./scripts/cacbg/register-ts.mjs scripts/cacbg/load.mjs

      - name: Audit published links (fails the run on any libel-invariant violation)
        run: node --import ./scripts/cacbg/register-ts.mjs scripts/cacbg/audit.mjs

      - name: Apply migrations to the target D1
        # migrations apply resolves the DB from the config, so render the real database_id + name first
        # (committed config holds a zero-UUID placeholder + base name 'sigma') — same as the deploy path.
        run: |
          node scripts/wrangler-render.mjs apps/web/wrangler.jsonc
          pnpm --filter @sigma/web exec wrangler d1 migrations apply "$SIGMA_D1_NAME" \
            --config wrangler.deploy.jsonc --remote

      - name: Ship свързани-лица tables → D1
        run: node scripts/ship-related-persons.mjs --work-db data/work/backfill.sqlite --remote --yes
