# Live assistant accuracy eval — MANUAL DISPATCH ONLY.
#
# Deliberately not on `push`/`pull_request`/`schedule`: each case is a paid, multi-step model generation
# that shares the assistant's global rate-limit, and LLM answers are non-deterministic — so this is a
# monitor you run on demand, never a per-commit gate. It runs the catalog against an explicit target
# (a turnstile-off deployment with a seeded D1) and prints the ✅/⚠️/❌ scorecard to the job log.
name: assistant-eval

on:
  workflow_dispatch:
    inputs:
      eval_url:
        description: 'Assistant chat endpoint, e.g. https://sigma-dev.example.workers.dev/assistant/chat (turnstile off)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run accuracy catalog
        env:
          SIGMA_EVAL_URL: ${{ inputs.eval_url }}
        run: pnpm --filter @sigma/web test:eval:live
