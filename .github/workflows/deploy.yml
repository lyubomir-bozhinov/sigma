name: Deploy (web + etl → Cloudflare)

# Production deploys originate here, not from a developer machine (see AGENTS.md / README.md): the
# scoped Cloudflare credential lives only in repo secrets. Ships the v1 set — the SSR explorer
# (`sigma`) and the refresh Workflow (`sigma-etl`). The remote D1 must already be provisioned and its
# real database_id set in the wrangler configs (see docs/deploy.md). No-ops cleanly without secrets.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Guard — require deploy credentials
        id: guard
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "No CLOUDFLARE_API_TOKEN — skipping deploy (set the repo secret to enable)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Typecheck
        if: steps.guard.outputs.ok == 'true'
        run: pnpm typecheck

      - name: Deploy explorer (sigma)
        if: steps.guard.outputs.ok == 'true'
        run: pnpm --filter @sigma/web deploy

      - name: Deploy refresh Workflow (sigma-etl)
        if: steps.guard.outputs.ok == 'true'
        run: pnpm --filter @sigma/etl deploy
