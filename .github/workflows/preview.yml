name: PR preview (ephemeral sigma worker)

# Ephemeral per-PR preview of the SSR explorer. Each open PR gets its own Worker named `sigma-pr-<num>`
# at https://sigma-pr-<num>.<account-subdomain>.workers.dev, deleted when the PR closes.
#
# Design (see docs/dev-environments.md):
#   - Web worker ONLY. The ETL worker is cron-only and WRITES D1 — we never spin a per-PR copy of it.
#   - Previews SHARE the long-lived dev D1 + dev R2 bucket (read-only from the preview worker). No
#     per-PR data provisioning, no per-PR seed — the preview shows the same data the dev env has.
#   - All credentials come from a `preview` GitHub Environment whose SIGMA_D1_ID points at the dev D1.
#     Keep that environment WITHOUT required reviewers, or every preview deploy will block.
#
# Security: fork PRs cannot read repo secrets, so the deploy/teardown jobs are gated to same-repo
# branches. Fork PRs still get normal CI from ci.yml; they just don't get a live preview.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Build + single-Worker deploy is a few minutes; cap well under the 360-min default so a wedged
    # wrangler or stalled network fails fast instead of holding a runner for hours.
    timeout-minutes: 10
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Shared dev data: SIGMA_D1_ID is the dev database's id (set on the `preview` Environment).
      SIGMA_D1_ID: ${{ secrets.SIGMA_D1_ID }}
      SIGMA_D1_NAME: ${{ vars.SIGMA_D1_NAME }}
      SIGMA_CSV_CACHE_NAME: ${{ vars.SIGMA_CSV_CACHE_NAME }}
      # Assistant resources are shared with dev (one Vectorize index + one reports bucket, no per-preview
      # seed). When dev/preview live on a Cloudflare account whose committed defaults don't exist (the
      # b2abee… account names them `sigma-*-dev`), these MUST be set so the REPORTS/VECTORIZE bindings
      # resolve to real resources; unset → committed defaults (docs/dev-preview-account-split.md).
      SIGMA_REPORTS_NAME: ${{ vars.SIGMA_REPORTS_NAME }}
      SIGMA_VECTORIZE_NAME: ${{ vars.SIGMA_VECTORIZE_NAME }}
      # AI-Gateway account id override — same story as SIGMA_REPORTS_NAME: set on the `preview` Environment
      # when it lives on a different account than the committed gateway URLs (docs/dev-preview-account-split.md).
      SIGMA_AI_GATEWAY_ACCOUNT: ${{ vars.SIGMA_AI_GATEWAY_ACCOUNT }}
      # Per-PR worker name. wrangler-render.mjs writes this into wrangler.deploy.json.
      SIGMA_WEB_NAME: sigma-pr-${{ github.event.pull_request.number }}
      # Per-build dedup freshness `c`: the PR head sha. Previews share ONE sigma-dedup-dev namespace AND the
      # dev D1 (identical data version), so the build id is the ONLY discriminator — stamping the head sha
      # keeps each preview's (and the dev env's) dedup keys distinct, so no preview can cross-serve reports.
      SIGMA_BUILD_ID: ${{ github.event.pull_request.head.sha }}
      # A preview exists to exercise the assistant, so opt it IN over the committed fail-dark "false"
      # (wrangler-render stamps ASSISTANT_ENABLED). TURNSTILE_SECRET is provisioned per-preview in a
      # dedicated step below (like ASSISTANT_API_KEY) from the 'preview' Environment, so the bot gate is
      # live on previews when that secret is set; if it is unset the gate stays a no-op (fail-open).
      SIGMA_ASSISTANT_ENABLED: 'true'
      # Runtime deploy-env for the §9.3 HMAC gate (ADR-0012). A preview is ephemeral and public-but-throwaway,
      # so it fails OPEN — the signing key is still provisioned below (so signing is exercised live), but a
      # missing key degrades to UI-only rather than 503. wrangler-render stamps this into ENVIRONMENT.
      SIGMA_ENVIRONMENT: 'preview'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Guard — require preview credentials
        run: |
          missing=()
          [ -z "${CLOUDFLARE_API_TOKEN}" ] && missing+=("CLOUDFLARE_API_TOKEN")
          [ -z "${CLOUDFLARE_ACCOUNT_ID}" ] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "${SIGMA_D1_ID}" ]          && missing+=("SIGMA_D1_ID")
          [ -z "${SIGMA_D1_NAME}" ]        && missing+=("SIGMA_D1_NAME (var)")
          [ -z "${SIGMA_CSV_CACHE_NAME}" ] && missing+=("SIGMA_CSV_CACHE_NAME (var)")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::preview Environment is missing: ${missing[*]} — see docs/dev-environments.md."
            exit 1
          fi

      # Defense in depth: SIGMA_WEB_NAME is computed (sigma-pr-<n>), but the shared-data names come from
      # the `preview` Environment. Refuse the production D1/R2 names so a misconfigured environment can't
      # point previews at the live `sigma` data. Previews are meant to read the dev D1/R2 only.
      - name: Guard — preview must not point at production data
        run: |
          fail=0
          check() {  # $1=value  $2=prod default  $3=var name
            if [ "$1" = "$2" ]; then
              echo "::error::$3 must not be the production value '$2' for a preview — set it to the dev resource on the 'preview' Environment (see docs/dev-environments.md)."
              fail=1
            fi
          }
          check "$SIGMA_D1_NAME"        sigma           SIGMA_D1_NAME
          check "$SIGMA_CSV_CACHE_NAME" sigma-csv-cache SIGMA_CSV_CACHE_NAME
          [ "$fail" = 0 ] || exit 1

      # GitOps: enforce the shared dev report-dedup KV namespace from git (idempotent create-if-absent) and
      # hand its id to wrangler-render via SIGMA_DEDUP_KV_ID. Previews share the single `sigma-dedup-dev`
      # namespace with the dev env — the freshness token folded into every dedup key (dedup-request.ts)
      # isolates entries per build/data version, so one shared namespace can never cross-serve reports.
      - name: Ensure DEDUP_KV namespace (shared dev)
        run: |
          id="$(node scripts/ensure-kv-namespace.mjs sigma-dedup-dev)"
          echo "::add-mask::$id"
          echo "SIGMA_DEDUP_KV_ID=$id" >> "$GITHUB_ENV"

      # GitOps: ensure the account-scoped `bggpt-voice` custom provider (+ the shared `sigma-assistant`
      # gateway) the VOICE lane calls directly. Provider-only — the assistant hits the gateway's provider
      # endpoints for transcription, NOT a dynamic route (dynamic routing can't carry audio; see ADR-0011).
      # Idempotent: a no-op when the provider already exists. VOICE_ASSISTANT_API_KEY is used only to
      # first-create the provider; absent (or already present) ⇒ reused untouched.
      - name: Ensure voice AI-Gateway provider
        env:
          VOICE_ASSISTANT_API_KEY: ${{ secrets.VOICE_ASSISTANT_API_KEY }}
        run: node scripts/ensure-voice-provider.mjs --apply

      - name: Deploy preview worker
        id: deploy
        run: |
          set -o pipefail
          # `run deploy` builds, renders wrangler.deploy.json with SIGMA_WEB_NAME/SIGMA_D1_*, and deploys.
          pnpm --filter @sigma/web run deploy 2>&1 | tee deploy.log
          # The live URL includes the account subdomain (sigma-pr-<n>.<account-subdomain>.workers.dev),
          # which can't be reconstructed from SIGMA_WEB_NAME alone — so parse it from wrangler's output.
          # If parsing fails, leave it empty; the comment step says so rather than posting a dead link.
          url="$(grep -Eo 'https://[a-zA-Z0-9.-]+\.workers\.dev' deploy.log | head -n1)"
          if [ -z "$url" ]; then
            echo "::warning::Could not parse the preview URL from wrangler output; see the deploy log above."
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # The provider key (OpenRouter) is a per-worker-script secret, so the freshly-deployed sigma-pr-<n>
      # worker does NOT inherit it from the dev worker — set it here so /assistant/chat works in the preview
      # (the assistant binds the shared dev Vectorize/R2 by name, and reaches the model through the AI
      # Gateway configured in wrangler.jsonc vars, but the key must be attached per script). Runs AFTER the
      # deploy: the worker must exist before a secret can be put on it. Optional + fails OPEN: if
      # ASSISTANT_API_KEY is unset on the `preview` Environment, skip it — the assistant degrades to a
      # controlled 503 (UI-only preview), which must NOT fail an otherwise-good preview deploy.
      - name: Provision assistant key (ASSISTANT_API_KEY) on the preview worker
        env:
          ASSISTANT_API_KEY: ${{ secrets.ASSISTANT_API_KEY }}
        run: |
          if [ -z "${ASSISTANT_API_KEY}" ]; then
            echo "::notice::ASSISTANT_API_KEY is not set on the 'preview' Environment — the assistant will 503 in this preview (UI only). See docs/dev-environments.md."
            exit 0
          fi
          printf '%s' "${ASSISTANT_API_KEY}" | pnpm --filter @sigma/web exec wrangler secret put ASSISTANT_API_KEY --name "$SIGMA_WEB_NAME"

      # Same per-script secret story as ASSISTANT_API_KEY above: a freshly-deployed sigma-pr-<n> worker
      # starts with NO secrets, so the Turnstile edge gate would silently be a no-op on every new/redeployed
      # preview unless we attach the widget secret here. The PUBLIC site key ships in wrangler.jsonc vars;
      # this is its secret half. Runs AFTER the deploy (the worker must exist before a secret can be put on
      # it) and fails OPEN: if TURNSTILE_SECRET is unset on the 'preview' Environment, skip it — the gate
      # degrades to a no-op rather than failing an otherwise-good preview deploy.
      - name: Provision Turnstile secret (TURNSTILE_SECRET) on the preview worker
        env:
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
        run: |
          if [ -z "${TURNSTILE_SECRET}" ]; then
            echo "::notice::TURNSTILE_SECRET is not set on the 'preview' Environment — the assistant bot gate is a no-op in this preview (see docs/dev-environments.md)."
            exit 0
          fi
          printf '%s' "${TURNSTILE_SECRET}" | pnpm --filter @sigma/web exec wrangler secret put TURNSTILE_SECRET --name "$SIGMA_WEB_NAME"

      # The §9.3 transcript-signing key (ADR-0011/0012). Unlike the two secrets above there is no human
      # value: it is a purely internal HMAC key, so CI generates it if absent (like LOG_IP_KEY in deploy.yml)
      # and leaves it untouched on redeploys — a stable key keeps in-flight client transcripts verifiable.
      # Provisioning it here makes signing ACTIVE on the preview so the round-trip can be validated live;
      # the preview still fails OPEN at runtime (SIGMA_ENVIRONMENT=preview), so this can never block a deploy.
      # Runs AFTER the deploy — the worker must exist before a secret can be put on it.
      - name: Provision assistant HMAC key (ASSISTANT_HMAC_KEY) on the preview worker
        run: node scripts/ensure-worker-secret.mjs ASSISTANT_HMAC_KEY

      - name: Comment preview URL on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const worker = process.env.SIGMA_WEB_NAME;
            const marker = '<!-- sigma-preview -->';
            const headline = url
              ? `🌐 **Preview deployed** → ${url}`
              : `🌐 **Preview deployed**, but the URL couldn't be auto-detected — see the "Deploy preview worker" step in the [workflow run](${process.env.RUN_URL}).`;
            const body = `${marker}\n${headline}\n\n` +
              `Worker \`${worker}\` · shares the **dev** D1 (read-only). Updates on each push; removed when this PR closes.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          SIGMA_WEB_NAME: ${{ env.SIGMA_WEB_NAME }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Render the live preview location into the run's Job Summary (the box on the Actions run page),
      # so the URL is discoverable straight from the workflow run — not only the PR comment.
      - name: Preview environment summary
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        run: |
          {
            echo "## 🌐 Preview environment"
            echo
            if [ -n "$PREVIEW_URL" ]; then
              echo "✅ **Deployed** → [$PREVIEW_URL]($PREVIEW_URL)"
            else
              echo "⚠️ Deployed, but the URL couldn't be auto-detected — see the **Deploy preview worker** step log."
            fi
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Worker | \`$SIGMA_WEB_NAME\` (web/SSR only — no per-PR ETL) |"
            echo "| Data | shares the **dev** D1 \`$SIGMA_D1_NAME\` + R2 \`$SIGMA_CSV_CACHE_NAME\` (read-only) |"
            echo "| Lifecycle | redeployed on each push · torn down when this PR closes |"
          } >> "$GITHUB_STEP_SUMMARY"

  teardown:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    # Teardown must run to completion — never let a racing deploy (same PR, shared workflow-level group)
    # cancel it and orphan the sigma-pr-<n> worker. Own group, no cancellation; the deletion is idempotent.
    concurrency:
      group: preview-teardown-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    # Just an idempotent worker delete — minutes at most. Cap low vs the 360-min default.
    timeout-minutes: 5
    environment: preview
    permissions:
      contents: read
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      SIGMA_WEB_NAME: sigma-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Deletes only the per-PR worker. The shared dev D1/R2 are never touched (teardown-remote.mjs
      # refuses protected long-lived names). Uses the web package's pinned wrangler.
      - name: Delete preview worker
        run: pnpm --filter @sigma/web exec node ../../scripts/teardown-remote.mjs --name "$SIGMA_WEB_NAME"

      - name: Teardown summary
        run: |
          {
            echo "## 🧹 Preview environment"
            echo
            echo "Worker \`$SIGMA_WEB_NAME\` was torn down (PR closed). The shared dev D1/R2 are untouched."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note teardown on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- sigma-preview -->';
            const body = `${marker}\n🧹 Preview \`${process.env.SIGMA_WEB_NAME}\` torn down (PR closed).`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            }
        env:
          SIGMA_WEB_NAME: ${{ env.SIGMA_WEB_NAME }}
