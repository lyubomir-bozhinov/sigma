name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        continue-on-error: true
        # TODO: flip to blocking once xlsx@0.18.5 is upgraded to a patched build.
        run: pnpm audit --audit-level=high
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
      - name: Lint
        continue-on-error: true
        # TODO: flip to blocking after a dedicated repo-wide `pnpm format` clears the
        # pre-existing prettier debt (mocks/, legacy scripts, root docs).
        run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
