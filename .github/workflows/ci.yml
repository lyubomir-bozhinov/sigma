name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Secret scan FIRST, on the pristine checkout (tracked files only) — before `pnpm install`
      # creates node_modules. The gitleaks *Action* requires a paid GITLEAKS_LICENSE on GitHub
      # organizations (e.g. midt-bg); the gitleaks *binary* is free, so run the pinned CLI — it
      # works on the personal main repo and the org mirror alike, with no license.
      - name: Secret scan (gitleaks)
        env:
          GITLEAKS_VERSION: 8.30.1
          # sha256 of gitleaks_8.30.1_linux_x64.tar.gz (from the release checksums.txt). Verify the
          # download before executing it, so a swapped/MITM'd artifact can't run code on the runner.
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          tarball="$RUNNER_TEMP/gitleaks.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o "$tarball"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xz -C "$RUNNER_TEMP" -f "$tarball" gitleaks
          "$RUNNER_TEMP/gitleaks" dir . --redact --no-banner

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level=high
      - name: Lint
        continue-on-error: true
        # TODO: flip to blocking after a dedicated repo-wide `pnpm format` clears the
        # pre-existing prettier debt (mocks/, legacy scripts, root docs).
        run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Script unit tests
        # scripts/ is not a workspace package, so `pnpm test` (turbo) does not cover it.
        run: node --test scripts/*.test.mjs
