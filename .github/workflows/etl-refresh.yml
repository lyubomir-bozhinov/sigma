name: ETL refresh (OCDS + Trade Register deltas)

# Live ETL for the open-data feeds. Per docs/etl-pipeline.md, ongoing deltas run on a schedule (the
# heavy admin backfill stays a manual/one-time CLI job). These loaders need Node + a filesystem + XML
# parsing, so CI cron is their home (the apps/etl Worker is reserved for light in-Worker tasks).
#
# Cadence: daily. The Trade Register publishes daily XML deltas; the OCDS catch-up is idempotent
# (scoped reload + admin-wins dedup in normalize), so a daily run only ever adds genuinely-new rows.
#
# Activates once the remote D1 is provisioned and these repo secrets are set:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID  (+ a real database_id in apps/api/wrangler.toml).
# Without them the job no-ops cleanly.

on:
  schedule:
    - cron: '0 3 * * *' # daily 03:00 UTC
  workflow_dispatch:
    inputs:
      tr_days:
        description: 'Trade Register daily files to pull (window)'
        default: '2'
        required: false

concurrency:
  group: etl-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Guard — require remote D1 credentials
        id: guard
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "No CLOUDFLARE_API_TOKEN — skipping (provision the remote D1 to enable)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: OCDS go-forward delta (2026+)
        if: steps.guard.outputs.ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec node scripts/load-ocds.mjs --all --apply --remote

      - name: Trade Register daily delta (companies / owners / beneficial owners)
        if: steps.guard.outputs.ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec node scripts/load-tr.mjs --limit=${{ github.event.inputs.tr_days || '2' }} --apply --remote

      - name: Reference + domain rebuild (NUTS seed → normalize, with dedup + enrichment)
        if: steps.guard.outputs.ok == 'true'
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler d1 execute sigma --remote --file ../../scripts/load-nuts.sql
          pnpm exec wrangler d1 execute sigma --remote --file ../../scripts/derive-amendments.sql
          pnpm exec wrangler d1 execute sigma --remote --file ../../scripts/normalize-egov.sql
