name = "sigma-assistant"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8788

# ANTHROPIC_API_KEY / AI Gateway creds are provided via .dev.vars locally and
# `wrangler secret` in production — never committed.

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
